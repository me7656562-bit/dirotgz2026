services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dirotgz
    ports:
      - "5432:5432"
    volumes:
      - dirotgz_pgdata:/var/lib/postgresql/data

volumes:
  dirotgz_pgdata:
